<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0e0e12">
    <title>Maths Gists</title>

    <!-- Computer Modern (the default LaTeX font) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@fontsource/cmu-serif@1.0.3/index.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">

    <!-- MathJax: renders $...$ and $$...$$ -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                tags: 'ams'
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Marked: markdown -> HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overscroll-behavior-y: none; }
        body {
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            background: #0e0e12; color: #e8e8ee;
            font-family: -apple-system, system-ui, sans-serif;
        }
        #wrap {
            display: flex; gap: 20px; background: #17171f;
            padding: 22px; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 1200px; width: 100%;
        }
        #controls {
            width: 260px; flex: 0 0 260px;
            min-height: 680px;
            display: flex; flex-direction: column;
        }
        #titleBlock { flex: 0 0 auto; }
        #titleBlock h1 { font-size: 16px; margin: 0; font-weight: 600; }
        #titleBlock .sub { color: #888; font-size: 11px; line-height: 1.5; margin-top: 6px; }
        #controlsInner {
            flex: 1; display: flex; flex-direction: column;
            gap: 14px; font-size: 13px; margin-top: 18px; min-height: 0;
        }
        .row { display: flex; flex-direction: column; gap: 4px; }
        .row label { color: #aaa; font-size: 12px; }
        button, input[type=text], input[type=search] {
            background: #23232e; color: #e8e8ee; border: 1px solid #33333f;
            padding: 8px 10px; border-radius: 5px; font-size: 14px; cursor: pointer;
            font-family: inherit;
        }
        input[type=text], input[type=search] { cursor: text; -webkit-appearance: none; appearance: none; }
        button:hover { background: #2d2d3a; }
        button.primary { background: #5b6cff; border-color: #5b6cff; }
        button.primary:hover { background: #6d7dff; }
        button:disabled { opacity: 0.45; cursor: not-allowed; }

        #fileList {
            flex: 1; min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #23232e; border-radius: 5px;
            background: #13131a;
        }
        .file {
            padding: 12px 12px; font-size: 13px; cursor: pointer;
            border-bottom: 1px solid #1f1f28;
            color: #cfcfd8; font-family: monospace;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .file:hover { background: #1d1d26; }
        .file.active { background: #2a2a3c; color: #fff; border-left: 3px solid #5b6cff; padding-left: 9px; }
        .file:last-child { border-bottom: none; }

        .status {
            font-family: monospace; font-size: 11px; color: #888;
            padding: 4px 0; min-height: 20px;
        }

        /* Mobile header (hidden on desktop) */
        #mobileHeader {
            display: none;
            position: sticky; top: 0; z-index: 20;
            background: #17171f;
            padding: 10px 14px;
            border-bottom: 1px solid #23232e;
            align-items: center; gap: 12px;
            margin: -22px -22px 16px -22px;
            border-radius: 10px 10px 0 0;
        }
        #mobileHeader h1 { font-size: 15px; margin: 0; font-weight: 600; flex: 1; }
        #menuBtn {
            background: #23232e; border: 1px solid #33333f;
            color: #e8e8ee; padding: 8px 10px; border-radius: 5px;
            font-size: 18px; line-height: 1; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            min-width: 40px; min-height: 40px;
        }
        #backdrop {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 40;
        }

        #paper {
            flex: 1;
            background: #f6f4ee;
            color: #1a1a1a;
            border-radius: 6px;
            padding: 64px 80px;
            min-height: 680px;
            font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, "Times New Roman", serif;
            line-height: 1.6;
            font-size: 18px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        #paper .empty {
            color: #8a8275; text-align: center; margin-top: 200px;
            font-style: italic;
        }
        #paper h1.doc-title {
            font-size: 32px;
            text-align: center;
            margin: 0 0 10px 0;
            font-weight: 700;
            font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
        }
        #paper .doc-subtitle {
            font-size: 18px;
            text-align: center;
            font-weight: 400;
            font-style: italic;
            color: #444;
            margin: 0 0 14px 0;
            font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
        }
        #paper .doc-date {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 44px;
        }
        #paper .doc-body p { margin: 0 0 1em 0; }
        #paper .doc-body h1 { font-size: 22px; margin: 1.6em 0 0.5em; }
        #paper .doc-body h2 { font-size: 19px; margin: 1.4em 0 0.4em; }
        #paper .doc-body h3 { font-size: 17px; margin: 1.2em 0 0.3em; font-style: italic; }
        #paper .doc-body ul, #paper .doc-body ol { padding-left: 1.6em; margin: 0 0 1em; }
        #paper .doc-body li { margin-bottom: 0.3em; }
        #paper .doc-body code {
            background: #e8e4d8; padding: 1px 5px; border-radius: 3px;
            font-size: 0.88em; font-family: "SF Mono", Menlo, monospace;
            word-break: break-word;
        }
        #paper .doc-body pre {
            background: #e8e4d8; padding: 12px 16px; border-radius: 4px;
            overflow-x: auto; font-size: 0.9em;
            -webkit-overflow-scrolling: touch;
        }
        #paper .doc-body pre code { background: none; padding: 0; word-break: normal; }
        #paper .doc-body blockquote {
            border-left: 3px solid #c0b8a0; margin: 1em 0; padding: 0.2em 1em;
            color: #555; font-style: italic;
        }
        #paper .doc-body hr {
            border: none; border-top: 1px solid #d4cdb8; margin: 2em 0;
        }
        #paper .doc-body a { color: #5b5bdc; word-break: break-word; }
        #paper .doc-body table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #paper .doc-body th, #paper .doc-body td {
            border: 1px solid #c0b8a0; padding: 6px 12px;
        }
        #paper .doc-body mjx-container[display="true"] {
            overflow-x: auto; overflow-y: hidden;
            max-width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== Tablet ===== */
        @media (max-width: 900px) {
            body { padding: 12px; }
            #wrap { padding: 18px; gap: 16px; }
            #controls { width: 220px; flex: 0 0 220px; }
            #paper { padding: 48px 48px; font-size: 17px; }
        }

        /* ===== Mobile ===== */
        @media (max-width: 680px) {
            body { padding: 0; background: #17171f; align-items: stretch; }
            #wrap {
                flex-direction: column;
                padding: 16px;
                gap: 0;
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
                min-height: 100dvh;
            }

            #mobileHeader { display: flex; }

            #controls {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                width: 82%;
                max-width: 320px;
                flex: none;
                min-height: 0;
                background: #17171f;
                padding: 18px;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                box-shadow: 2px 0 18px rgba(0,0,0,0.5);
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            #controls.open { transform: translateX(0); }
            #backdrop.open { display: block; }

            #paper {
                padding: 28px 20px 48px;
                min-height: 0;
                font-size: 17px;
                border-radius: 6px;
            }
            #paper .empty { margin-top: 80px; }
            #paper h1.doc-title { font-size: 26px; }
            #paper .doc-subtitle { font-size: 16px; }
            #paper .doc-date { margin-bottom: 28px; }
            #paper .doc-body h1 { font-size: 20px; }
            #paper .doc-body h2 { font-size: 17px; }
            #paper .doc-body h3 { font-size: 16px; }

            .file { padding: 14px 12px; font-size: 14px; }

            /* Prevent iOS zoom on focus */
            input[type=text], input[type=search], button { font-size: 16px; }
        }
    </style>
</head>
<body>
<div id="backdrop"></div>
<div id="wrap">
    <div id="mobileHeader">
        <button id="menuBtn" aria-label="Open file list">☰</button>
        <h1>Maths Gists</h1>
    </div>

    <div id="controls">
        <div id="titleBlock">
            <h1>Maths Gists</h1>
            <div class="sub">Markdown + LaTeX notes from the repo</div>
        </div>

        <div id="controlsInner">
            <button id="refreshBtn">↻ Refresh list</button>
            <div class="row">
                <label>Files in /gists</label>
                <input type="search" id="filterInput" placeholder="Filter…" autocomplete="off"
                       style="background:#23232e;color:#e8e8ee;border:1px solid #33333f;padding:9px 10px;border-radius:5px;font-family:inherit;">
                <div id="fileList"></div>
            </div>
            <div class="status" id="status">Loading…</div>
        </div>
    </div>

    <div id="paper">
        <div class="empty">Select a gist from the list.</div>
    </div>
</div>

<script>
    // ============================================================
    // CONFIG
    // ============================================================
    const REPO   = "nathanevaans/math-gists";
    const BRANCH = "main";
    const FOLDER = "gists";

    // ============================================================
    // File discovery via GitHub API.
    // ============================================================
    const fileListEl = document.getElementById("fileList");
    const statusEl = document.getElementById("status");
    const paperEl = document.getElementById("paper");
    const refreshBtn = document.getElementById("refreshBtn");
    const controlsEl = document.getElementById("controls");
    const backdropEl = document.getElementById("backdrop");
    const menuBtn = document.getElementById("menuBtn");

    let activeFile = null;
    let allFiles = [];

    function isMobile() {
        return window.matchMedia("(max-width: 680px)").matches;
    }
    function openSidebar() {
        controlsEl.classList.add("open");
        backdropEl.classList.add("open");
    }
    function closeSidebar() {
        controlsEl.classList.remove("open");
        backdropEl.classList.remove("open");
    }
    menuBtn.addEventListener("click", () => {
        if (controlsEl.classList.contains("open")) closeSidebar(); else openSidebar();
    });
    backdropEl.addEventListener("click", closeSidebar);

    function renderFileList(filter = "") {
        fileListEl.innerHTML = "";
        const f = filter.trim().toLowerCase();
        const shown = f ? allFiles.filter(x => x.name.toLowerCase().includes(f)) : allFiles;
        for (const file of shown) {
            const el = document.createElement("div");
            el.className = "file";
            el.textContent = file.name;
            el.title = file.name;
            if (file.name === activeFile) el.classList.add("active");
            el.addEventListener("click", () => loadFile(file, el));
            fileListEl.appendChild(el);
        }
        if (allFiles.length === 0) {
            statusEl.textContent = `No .tex or .md files in /${FOLDER}`;
        } else {
            statusEl.textContent = f
                ? `${shown.length} of ${allFiles.length} match`
                : `${allFiles.length} file${allFiles.length === 1 ? "" : "s"}`;
        }
    }

    document.getElementById("filterInput").addEventListener("input", e => {
        renderFileList(e.target.value);
    });

    async function loadFileList() {
        fileListEl.innerHTML = "";
        statusEl.textContent = "Fetching file list…";

        const apiUrl = `https://api.github.com/repos/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;
        try {
            const res = await fetch(apiUrl);
            if (!res.ok) throw new Error(`GitHub API ${res.status}`);
            const items = await res.json();
            allFiles = items
                .filter(i => i.type === "file" && /\.(tex|md)$/i.test(i.name))
                .sort((a, b) => a.name.localeCompare(b.name));
            renderFileList(document.getElementById("filterInput").value);
        } catch (err) {
            statusEl.textContent = `Error: ${err.message}`;
            paperEl.innerHTML = `<div class="empty">
                Could not load file list.<br><br>
                Check that REPO, BRANCH, and FOLDER are set correctly
                at the top of the &lt;script&gt; block, and that the repo is public.
            </div>`;
        }
    }

    async function loadFile(fileMeta, el) {
        document.querySelectorAll(".file.active").forEach(e => e.classList.remove("active"));
        el.classList.add("active");
        activeFile = fileMeta.name;

        statusEl.textContent = `Loading ${fileMeta.name}…`;
        paperEl.innerHTML = `<div class="empty">Loading…</div>`;

        // Auto-close the sidebar on mobile after picking a file
        if (isMobile()) closeSidebar();

        try {
            const res = await fetch(fileMeta.download_url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            renderDoc(text);
            statusEl.textContent = fileMeta.name;
            // Scroll paper to top after load
            paperEl.scrollTop = 0;
            window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (err) {
            paperEl.innerHTML = `<div class="empty">Error loading file: ${err.message}</div>`;
            statusEl.textContent = `Error: ${err.message}`;
        }
    }

    // ============================================================
    // Document rendering.
    // ============================================================
    function parseFrontMatter(src) {
        const meta = {};
        let body = src;
        const fmMatch = src.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
        if (fmMatch) {
            const block = fmMatch[1];
            for (const line of block.split("\n")) {
                const m = line.match(/^([A-Za-z_][\w-]*)\s*:\s*(.*)$/);
                if (m) meta[m[1].toLowerCase()] = m[2].trim().replace(/^["']|["']$/g, "");
            }
            body = src.slice(fmMatch[0].length);
            return { meta, body };
        }

        const lines = body.split("\n");
        let i = 0;
        while (i < lines.length && lines[i].trim() === "") i++;
        if (i < lines.length && /^#\s+/.test(lines[i])) {
            meta.title = lines[i].replace(/^#\s+/, "").trim();
            i++;
            while (i < lines.length && lines[i].trim() === "") i++;
            const subMatch = i < lines.length && lines[i].match(/^\*(.+)\*\s*$/);
            if (subMatch) { meta.subtitle = subMatch[1].trim(); i++; }
            body = lines.slice(i).join("\n");
        }
        return { meta, body };
    }

    function renderMarkdownWithMath(src) {
        const stash = [];
        const placeholder = i => `@@MATH${i}@@`;

        let protectedSrc = src.replace(/\$\$([\s\S]+?)\$\$/g, (m) => {
            stash.push(m); return placeholder(stash.length - 1);
        });
        protectedSrc = protectedSrc.replace(/(^|[^\\])\$([^\n$]+?)\$/g, (m, pre, body) => {
            stash.push("$" + body + "$"); return pre + placeholder(stash.length - 1);
        });
        protectedSrc = protectedSrc.replace(/\\\[([\s\S]+?)\\\]/g, (m) => {
            stash.push(m); return placeholder(stash.length - 1);
        });
        protectedSrc = protectedSrc.replace(/\\\(([\s\S]+?)\\\)/g, (m) => {
            stash.push(m); return placeholder(stash.length - 1);
        });

        let html = marked.parse(protectedSrc);
        html = html.replace(/@@MATH(\d+)@@/g, (_, i) => stash[parseInt(i, 10)]);
        return html;
    }

    function renderDoc(src) {
        const { meta, body } = parseFrontMatter(src);
        const bodyHtml = renderMarkdownWithMath(body);

        let html = "";
        if (meta.title) html += `<h1 class="doc-title">${escapeHtml(meta.title)}</h1>`;
        if (meta.subtitle) html += `<div class="doc-subtitle">${escapeHtml(meta.subtitle)}</div>`;
        if (meta.date) html += `<div class="doc-date">${escapeHtml(meta.date)}</div>`;
        html += `<div class="doc-body">${bodyHtml}</div>`;

        paperEl.innerHTML = html;

        if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise([paperEl]).catch(err => console.warn(err));
        }
    }

    function escapeHtml(s) {
        return s.replace(/[&<>"']/g, c => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        }[c]));
    }

    refreshBtn.addEventListener("click", loadFileList);
    loadFileList();
</script>
</body>
</html>
